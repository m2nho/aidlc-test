openapi: 3.0.3
info:
  title: Table Order Service API
  description: MVP 테이블오더 서비스 Backend API
  version: 1.0.0
  contact:
    name: Table Order Team

servers:
  - url: http://localhost:8000
    description: Development server

tags:
  - name: Auth
    description: 인증 관련 API
  - name: Orders
    description: 주문 관리 API
  - name: Tables
    description: 테이블 세션 관리 API
  - name: Menus
    description: 메뉴 관리 API
  - name: SSE
    description: Server-Sent Events API

paths:
  /api/auth/login/customer:
    post:
      tags:
        - Auth
      summary: 고객 로그인
      description: 테이블 번호와 비밀번호로 고객 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - table_number
                - password
              properties:
                table_number:
                  type: integer
                  example: 5
                password:
                  type: string
                  example: "1234"
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: JWT 토큰 (HTTP-only Cookie)
              schema:
                type: string
                example: access_token=eyJhbGc...; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  store:
                    $ref: '#/components/schemas/Store'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/login/admin:
    post:
      tags:
        - Auth
      summary: 관리자 로그인
      description: 사용자명과 비밀번호로 관리자 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "admin"
                password:
                  type: string
                  example: "admin1234"
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: JWT 토큰 (HTTP-only Cookie)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  admin:
                    $ref: '#/components/schemas/Admin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 로그아웃
      description: 현재 세션 로그아웃 (쿠키 삭제)
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logout successful"

  /api/orders:
    get:
      tags:
        - Orders
      summary: 주문 목록 조회
      description: 현재 스토어의 주문 목록 조회 (관리자 전용)
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, preparing, completed]
          description: 주문 상태 필터
        - name: table_id
          in: query
          schema:
            type: integer
          description: 테이블 ID 필터
      responses:
        '200':
          description: 주문 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Orders
      summary: 주문 생성
      description: 새로운 주문 생성 (고객 전용)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - table_id
                - items
              properties:
                table_id:
                  type: integer
                  example: 1
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - menu_id
                      - quantity
                    properties:
                      menu_id:
                        type: integer
                        example: 1
                      quantity:
                        type: integer
                        example: 2
      responses:
        '201':
          description: 주문 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/orders/{order_id}:
    get:
      tags:
        - Orders
      summary: 주문 상세 조회
      description: 특정 주문의 상세 정보 조회
      security:
        - cookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: 주문 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Orders
      summary: 주문 삭제
      description: 주문 삭제 (관리자 전용)
      security:
        - cookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 주문 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orders/{order_id}/status:
    patch:
      tags:
        - Orders
      summary: 주문 상태 변경
      description: 주문 상태 변경 (관리자 전용, pending → preparing → completed)
      security:
        - cookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, preparing, completed]
                  example: "preparing"
      responses:
        '200':
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/tables/session:
    get:
      tags:
        - Tables
      summary: 현재 테이블 세션 조회
      description: 현재 테이블의 활성 세션 조회 또는 생성
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableSession'

  /api/tables/session/complete:
    post:
      tags:
        - Tables
      summary: 테이블 세션 종료
      description: 현재 테이블 세션 종료 및 주문 아카이브 (관리자 전용)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - table_id
              properties:
                table_id:
                  type: integer
                  example: 1
      responses:
        '200':
          description: 세션 종료 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Session completed"
                  archived_orders_count:
                    type: integer
                    example: 5

  /api/tables/active:
    get:
      tags:
        - Tables
      summary: 활성 테이블 목록 조회
      description: 현재 활성 세션이 있는 테이블 목록 조회 (관리자 전용)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 활성 테이블 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TableWithSession'

  /api/tables/{table_id}/history:
    get:
      tags:
        - Tables
      summary: 테이블 주문 히스토리 조회
      description: 특정 테이블의 과거 주문 히스토리 조회 (관리자 전용)
      security:
        - cookieAuth: []
      parameters:
        - name: table_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 히스토리 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderHistory'

  /api/menus:
    get:
      tags:
        - Menus
      summary: 메뉴 목록 조회
      description: 현재 스토어의 메뉴 목록 조회
      security:
        - cookieAuth: []
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
          description: 카테고리 ID 필터
        - name: available
          in: query
          schema:
            type: boolean
          description: 판매 가능 여부 필터
      responses:
        '200':
          description: 메뉴 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Menu'

    post:
      tags:
        - Menus
      summary: 메뉴 생성
      description: 새로운 메뉴 생성 (관리자 전용)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - category_id
              properties:
                name:
                  type: string
                  example: "김치찌개"
                price:
                  type: integer
                  example: 8000
                description:
                  type: string
                  example: "돼지고기가 들어간 김치찌개"
                category_id:
                  type: integer
                  example: 1
                is_available:
                  type: boolean
                  example: true
      responses:
        '201':
          description: 메뉴 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'

  /api/menus/{menu_id}:
    patch:
      tags:
        - Menus
      summary: 메뉴 수정
      description: 메뉴 정보 수정 (관리자 전용)
      security:
        - cookieAuth: []
      parameters:
        - name: menu_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: integer
                description:
                  type: string
                is_available:
                  type: boolean
      responses:
        '200':
          description: 메뉴 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'

    delete:
      tags:
        - Menus
      summary: 메뉴 삭제
      description: 메뉴 삭제 (관리자 전용)
      security:
        - cookieAuth: []
      parameters:
        - name: menu_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 메뉴 삭제 성공

  /api/sse/orders:
    get:
      tags:
        - SSE
      summary: 주문 실시간 스트림
      description: 실시간 주문 이벤트 스트림 (관리자 전용, Server-Sent Events)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: SSE 스트림 연결 성공
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"order_created","order":{"id":1,"order_number":123,"table_number":5,"status":"pending"}}

                  data: {"type":"order_status_updated","order":{"id":1,"order_number":123,"status":"preparing"}}

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    Store:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "맛있는 식당"
        table_count:
          type: integer
          example: 10

    Admin:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: "admin"
        store_id:
          type: integer
          example: 1

    Table:
      type: object
      properties:
        id:
          type: integer
          example: 1
        store_id:
          type: integer
          example: 1
        table_number:
          type: integer
          example: 5

    TableSession:
      type: object
      properties:
        id:
          type: integer
          example: 1
        table_id:
          type: integer
          example: 1
        started_at:
          type: string
          format: date-time
          example: "2026-04-06T12:00:00Z"
        ended_at:
          type: string
          format: date-time
          nullable: true
          example: null

    TableWithSession:
      type: object
      properties:
        id:
          type: integer
        table_number:
          type: integer
        session:
          $ref: '#/components/schemas/TableSession'
        pending_orders_count:
          type: integer
          example: 3

    MenuCategory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        store_id:
          type: integer
          example: 1
        name:
          type: string
          example: "찌개류"
        display_order:
          type: integer
          example: 1

    Menu:
      type: object
      properties:
        id:
          type: integer
          example: 1
        store_id:
          type: integer
          example: 1
        category_id:
          type: integer
          example: 1
        name:
          type: string
          example: "김치찌개"
        description:
          type: string
          example: "돼지고기가 들어간 김치찌개"
        price:
          type: integer
          example: 8000
        is_available:
          type: boolean
          example: true
        category:
          $ref: '#/components/schemas/MenuCategory'

    Order:
      type: object
      properties:
        id:
          type: integer
          example: 1
        store_id:
          type: integer
          example: 1
        table_id:
          type: integer
          example: 1
        order_number:
          type: integer
          example: 123
        status:
          type: string
          enum: [pending, preparing, completed]
          example: "pending"
        created_at:
          type: string
          format: date-time
          example: "2026-04-06T12:30:00Z"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        table:
          $ref: '#/components/schemas/Table'

    OrderItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        order_id:
          type: integer
          example: 1
        menu_id:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        price:
          type: integer
          example: 8000
        menu:
          $ref: '#/components/schemas/Menu'

    OrderHistory:
      type: object
      properties:
        id:
          type: integer
        session_id:
          type: integer
        order_number:
          type: integer
        status:
          type: string
        total_amount:
          type: integer
        completed_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          example: "ORDER_NOT_FOUND"
        message:
          type: string
          example: "Order 123 not found"
        details:
          type: object

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "VALIDATION_ERROR"
            message: "Invalid request data"
            details:
              field: "quantity"
              issue: "must be greater than 0"

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "AUTH_INVALID_CREDENTIALS"
            message: "Invalid credentials"

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "ORDER_NOT_FOUND"
            message: "Order 123 not found"
            details:
              order_id: 123

    Conflict:
      description: 비즈니스 규칙 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "ORDER_STATUS_CONFLICT"
            message: "Cannot transition from completed to pending"
            details:
              current_status: "completed"
              requested_status: "pending"
